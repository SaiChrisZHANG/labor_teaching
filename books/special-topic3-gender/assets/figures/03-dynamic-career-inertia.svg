<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Dynamic career inertia after early choices</title>
  <desc id="desc">Initial placements can persist through switching costs, promotions, and flexibility constraints.</desc>
  <rect width="1100" height="560" fill="#ffffff"/>
  <text x="550" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#17202a">Later Adjustment Is Not Frictionless</text>
  <text x="550" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Early jobs can become durable career paths when moving across ladders is costly.</text>

  <line x1="120" y1="455" x2="980" y2="455" stroke="#374151" stroke-width="2"/>
  <line x1="120" y1="455" x2="120" y2="125" stroke="#374151" stroke-width="2"/>
  <text x="550" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151">Career time</text>
  <text x="48" y="300" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#374151" transform="rotate(-90 48 300)">Wage, authority, job quality</text>

  <path d="M145 405 C265 360 380 305 500 235 C650 145 810 135 955 120" stroke="#2563eb" stroke-width="5" fill="none"/>
  <path d="M145 405 C285 382 420 362 555 335 C700 306 835 282 955 250" stroke="#9a3412" stroke-width="5" fill="none"/>
  <path d="M145 405 C275 375 410 330 520 270 C620 218 690 210 760 185" stroke="#16a34a" stroke-width="3" fill="none" stroke-dasharray="7,8"/>
  <path d="M760 185 C810 170 875 158 955 145" stroke="#16a34a" stroke-width="3" fill="none" stroke-dasharray="7,8"/>

  <circle cx="250" cy="365" r="9" fill="#2563eb"/>
  <circle cx="250" cy="388" r="9" fill="#9a3412"/>
  <text x="250" y="338" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#374151">First placement</text>

  <rect x="405" y="385" width="230" height="66" rx="8" fill="#fef3c7" stroke="#c27803" stroke-width="2"/>
  <text x="520" y="412" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#693306">Switching cost</text>
  <text x="520" y="435" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#693306">lost seniority, retraining, networks</text>

  <rect x="690" y="318" width="245" height="66" rx="8" fill="#f3e8ee" stroke="#8b3f63" stroke-width="2"/>
  <text x="812" y="345" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#462033">Adjustment friction</text>
  <text x="812" y="368" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#462033">flexibility, timing, promotion gates</text>

  <line x1="680" y1="182" x2="680" y2="350" stroke="#6b7280" stroke-width="2" stroke-dasharray="5,6"/>
  <text x="680" y="172" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Family/career timing</text>

  <rect x="690" y="98" width="155" height="30" rx="6" fill="#dbeafe"/>
  <text x="767" y="119" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#1e40af">High-growth ladder</text>
  <rect x="690" y="232" width="170" height="30" rx="6" fill="#ffedd5"/>
  <text x="775" y="253" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#9a3412">Persistent early track</text>
  <rect x="805" y="136" width="135" height="30" rx="6" fill="#dcfce7"/>
  <text x="872" y="157" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#166534">Late switch</text>
</svg>

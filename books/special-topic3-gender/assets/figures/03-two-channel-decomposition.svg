<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Two-channel decomposition of gendered sorting</title>
  <desc id="desc">Conceptual map separating early choices from later adjustment frictions.</desc>
  <rect width="1100" height="560" fill="#ffffff"/>
  <text x="550" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#17202a">Gendered Sorting Is A Sequence</text>
  <text x="550" y="75" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Early choices and later adjustment are distinct channels that can reinforce each other.</text>

  <rect x="60" y="125" width="270" height="165" rx="10" fill="#e8f4f8" stroke="#2b6f86" stroke-width="3"/>
  <text x="195" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#123543">Early-choice channel</text>
  <text x="85" y="195" font-family="Arial, sans-serif" font-size="15" fill="#123543">Education and track</text>
  <text x="85" y="220" font-family="Arial, sans-serif" font-size="15" fill="#123543">Skills and signals</text>
  <text x="85" y="245" font-family="Arial, sans-serif" font-size="15" fill="#123543">Aspirations and beliefs</text>
  <text x="85" y="270" font-family="Arial, sans-serif" font-size="15" fill="#123543">Role models and information</text>

  <rect x="415" y="125" width="270" height="165" rx="10" fill="#f7f0d6" stroke="#9a7b18" stroke-width="3"/>
  <text x="550" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#453509">Entry sorting</text>
  <text x="440" y="195" font-family="Arial, sans-serif" font-size="15" fill="#453509">Major and first field</text>
  <text x="440" y="220" font-family="Arial, sans-serif" font-size="15" fill="#453509">First occupation or sector</text>
  <text x="440" y="245" font-family="Arial, sans-serif" font-size="15" fill="#453509">Initial employer and task</text>
  <text x="440" y="270" font-family="Arial, sans-serif" font-size="15" fill="#453509">Starting ladder and schedule</text>

  <rect x="770" y="125" width="270" height="165" rx="10" fill="#f3e8ee" stroke="#8b3f63" stroke-width="3"/>
  <text x="905" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#462033">Later-adjustment channel</text>
  <text x="795" y="195" font-family="Arial, sans-serif" font-size="15" fill="#462033">Switching costs</text>
  <text x="795" y="220" font-family="Arial, sans-serif" font-size="15" fill="#462033">Promotion bottlenecks</text>
  <text x="795" y="245" font-family="Arial, sans-serif" font-size="15" fill="#462033">Flexibility constraints</text>
  <text x="795" y="270" font-family="Arial, sans-serif" font-size="15" fill="#462033">Direct barriers to moving tracks</text>

  <path d="M335 207 L405 207" stroke="#374151" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M690 207 L760 207" stroke="#374151" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <path d="M905 295 C875 390 730 430 550 430 C370 430 225 390 195 295" stroke="#6b7280" stroke-width="3" fill="none" stroke-dasharray="8,8" marker-end="url(#arrow-light)"/>
  <text x="550" y="462" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Feedback: anticipated future constraints can change early choices; early choices can raise later switching costs.</text>

  <rect x="322" y="500" width="456" height="38" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="550" y="525" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#312e81">Long-run wages, authority, job quality, and welfare</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
    </marker>
    <marker id="arrow-light" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6b7280"/>
    </marker>
  </defs>
</svg>

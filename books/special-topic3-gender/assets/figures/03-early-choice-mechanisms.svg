<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="560" viewBox="0 0 1100 560" role="img" aria-labelledby="title desc">
  <title id="title">Early-choice mechanisms in gendered sorting</title>
  <desc id="desc">Mechanisms that shift major, training, and early occupation choice.</desc>
  <rect width="1100" height="560" fill="#ffffff"/>
  <text x="550" y="44" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#17202a">How Gender Enters Early Choices</text>
  <text x="550" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">The observed major or track is an equilibrium object, not a pure taste report.</text>

  <rect x="390" y="205" width="320" height="120" rx="12" fill="#eaf3ea" stroke="#3b7d3f" stroke-width="3"/>
  <text x="550" y="244" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d3b20">Major, track, training,</text>
  <text x="550" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d3b20">and first occupation</text>
  <text x="550" y="306" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" fill="#315334">Observed sorting margin</text>

  <rect x="70" y="120" width="235" height="72" rx="8" fill="#e8f4f8" stroke="#2b6f86" stroke-width="2"/>
  <text x="187" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#123543">Role models</text>
  <text x="187" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#123543">belonging and returns</text>

  <rect x="70" y="244" width="235" height="72" rx="8" fill="#f7f0d6" stroke="#9a7b18" stroke-width="2"/>
  <text x="187" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#453509">Competition</text>
  <text x="187" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#453509">tournaments and variance</text>

  <rect x="70" y="368" width="235" height="72" rx="8" fill="#f3e8ee" stroke="#8b3f63" stroke-width="2"/>
  <text x="187" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#462033">Teacher signals</text>
  <text x="187" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#462033">bias, stereotypes, feedback</text>

  <rect x="795" y="120" width="235" height="72" rx="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="912" y="150" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#312e81">Information</text>
  <text x="912" y="174" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#312e81">returns, fit, requirements</text>

  <rect x="795" y="244" width="235" height="72" rx="8" fill="#fef3c7" stroke="#c27803" stroke-width="2"/>
  <text x="912" y="274" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#693306">Aspirations</text>
  <text x="912" y="298" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#693306">identity and feasible selves</text>

  <rect x="795" y="368" width="235" height="72" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="912" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#4c1d95">Anticipated discrimination</text>
  <text x="912" y="422" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4c1d95">expected treatment and access</text>

  <path d="M306 156 L382 230" stroke="#374151" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M306 280 L380 265" stroke="#374151" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M306 404 L382 300" stroke="#374151" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M794 156 L718 230" stroke="#374151" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M794 280 L720 265" stroke="#374151" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M794 404 L718 300" stroke="#374151" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <text x="550" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">Each mechanism can shift the perceived return, cost, risk, or identity value of a field before labor-market entry.</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#374151"/>
    </marker>
  </defs>
</svg>
